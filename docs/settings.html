<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Settings · Expense Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/theme.js"></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Settings</h1>
    </header>

    <main class="app-content">
      <div class="card">
        <div class="section-title">Appearance</div>
        <div class="setting-row">
          <div>
            <div class="setting-row-label">Dark mode</div>
            <div class="setting-row-desc">Switch between light and dark theme</div>
          </div>
          <button class="btn-sm setting-row-action" onclick="toggleTheme()">Toggle</button>
        </div>
      </div>





      <div class="card">
        <div class="section-title">Categories</div>
        <div id="cat-list"></div>
        <button class="btn-add-cat" id="add-cat-btn">
          <i data-lucide="plus"></i> Add Category
        </button>
      </div>

      <div class="card">
        <div class="section-title">Paid By Methods</div>
        <div id="paid-list"></div>
        <button class="btn-add-cat" id="add-paid-btn">
          <i data-lucide="plus"></i> Add Paid Method
        </button>
      </div>

      <div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px 0">
        Expense Tracker · Local-only · Data stored in your browser
      </div>
    </main>

    <div id="bottom-nav-slot" data-active="settings"></div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/auth-gate.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/paid-methods.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
