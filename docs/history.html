<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>History · Expense Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/theme.js"></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>History</h1>
      <a href="add.html" class="icon-btn" data-add aria-label="Add">
        <i data-lucide="plus"></i>
      </a>
    </header>

    <main class="app-content">
      <div class="filters">
        <select id="filter-period">
          <option value="all">All time</option>
          <option value="day">Today</option>
          <option value="week">This week</option>
          <option value="month" selected>This month</option>
          <option value="year">This year</option>
          <option value="custom">Custom range…</option>
        </select>
        <select id="filter-cat">
          <option value="">All categories</option>
        </select>
      </div>
      <div class="filters" id="range-row" style="display:none">
        <input type="date" id="range-from" aria-label="From" />
        <input type="date" id="range-to" aria-label="To" />
      </div>

      <div id="list"></div>
      <div class="empty" id="empty" style="display:none">
        <i data-lucide="inbox"></i>
        <div class="empty-text">No records found.</div>
      </div>
    </main>

    <div id="bottom-nav-slot" data-active="history"></div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/auth-gate.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/paid-methods.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/add.js"></script>
  <script src="js/sheet.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
