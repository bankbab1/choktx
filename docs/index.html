<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Dashboard · Expense Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/theme.js"></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Dashboard</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="icon-btn" onclick="toggleTheme()" aria-label="Toggle theme">
          <i data-theme-icon data-lucide="moon"></i>
        </button>
        <button class="icon-btn" id="header-logout-btn" aria-label="Logout" title="Logout" style="display:none">
          <i data-lucide="log-out"></i>
        </button>
      </div>
    </header>

    <main class="app-content">
      <div class="period-tabs">
        <button class="period-btn active" data-period="day">Day</button>
        <button class="period-btn" data-period="week">Week</button>
        <button class="period-btn" data-period="month">Month</button>
        <button class="period-btn" data-period="year">Year</button>
      </div>

      <div class="summary">
        <div class="summary-label" id="period-label">This Month</div>
        <div class="summary-amount" id="total-amount">0.00</div>
        <div class="summary-count" id="total-count">0 entries</div>
      </div>

      <div class="card">
        <div class="chart-wrap">
          <canvas id="category-chart"></canvas>
        </div>
        <div id="breakdown"></div>
        <div class="empty" id="empty" style="display:none">
          <i data-lucide="bar-chart-3"></i>
          <div class="empty-text">No expenses yet. Tap + to add one.</div>
        </div>
      </div>

      <section id="recent-section" style="display:none">
        <div class="section-heading">
          <span>Records</span>
          <a href="history.html" class="section-link">View all</a>
        </div>
        <div id="recent-list"></div>
      </section>
    </main>

    <div id="bottom-nav-slot" data-active="home"></div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/auth-gate.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/add.js"></script>
  <script src="js/sheet.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    (function () {
      const btn = document.getElementById("header-logout-btn");
      if (!btn || !window.Sync) return;
      function refresh() { btn.style.display = window.Sync.loggedIn() ? "" : "none"; }
      refresh();
      window.addEventListener("expenses-synced", refresh);
      btn.addEventListener("click", async () => {
        const ok = await window.confirmModal({
          title: "Log out?",
          message: "You'll need your 6-digit code again to use the app.",
          confirmText: "Logout",
          danger: true,
        });
        if (!ok) return;
        window.Sync.logout();
        try {
          localStorage.removeItem("categories_v1");
          localStorage.removeItem("paid_methods_v1");
          localStorage.removeItem("expenses_v1");
        } catch {}
        location.reload();
      });
    })();
  </script>
</body>
</html>
