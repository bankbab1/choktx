<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Settings · Expense Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/theme.js"></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Settings</h1>
    </header>

    <main class="app-content">
      <div class="card">
        <div class="section-title">Appearance</div>
        <div class="setting-row">
          <div>
            <div class="setting-row-label">Dark mode</div>
            <div class="setting-row-desc">Switch between light and dark theme</div>
          </div>
          <button class="btn-sm setting-row-action" onclick="Theme.toggle();location.reload();">Toggle</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Data</div>
        <div class="setting-row">
          <div>
            <div class="setting-row-label">Export</div>
            <div class="setting-row-desc">Download all records as JSON</div>
          </div>
          <button class="btn-sm setting-row-action" onclick="exportData()">Export</button>
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-row-label">Import</div>
            <div class="setting-row-desc">Replace data from JSON file</div>
          </div>
          <label class="btn-sm setting-row-action" style="cursor:pointer">
            Import
            <input type="file" accept="application/json" style="display:none" onchange="importData(event)" />
          </label>
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-row-label">Clear all data</div>
            <div class="setting-row-desc">Delete every record permanently</div>
          </div>
          <button class="btn-sm danger setting-row-action" onclick="clearAll()">Clear</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Categories</div>
        <div id="cat-list"></div>
      </div>

      <div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px 0">
        Expense Tracker · Local-only · Data stored in your browser
      </div>
    </main>

    <div id="bottom-nav-slot" data-active="settings"></div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const catList = document.getElementById("cat-list");
    CATEGORY_NAMES.forEach(n => {
      const meta = CATEGORIES[n];
      const div = document.createElement("div");
      div.className = "cat-info";
      div.innerHTML = `
        <div class="cat-icon" style="background:${meta.color}1a;color:${meta.color}"><i data-lucide="${meta.icon}"></i></div>
        <div class="cat-info-body">
          <div class="cat-info-name">${n}</div>
          <div class="cat-info-subs">${meta.sub.length ? meta.sub.join(" · ") : "No subcategories"}</div>
        </div>`;
      catList.appendChild(div);
    });

    function exportData() {
      const blob = new Blob([Store.exportJSON()], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `expenses-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }
    function importData(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try { Store.importJSON(ev.target.result); alert("Imported successfully"); }
        catch (err) { alert("Import failed: " + err.message); }
      };
      reader.readAsText(file);
    }
    function clearAll() {
      if (confirm("Delete ALL records? This cannot be undone.")) {
        Store.clear();
        alert("All data cleared");
      }
    }
    setTimeout(() => window.refreshIcons && window.refreshIcons(), 0);
  </script>
</body>
</html>
